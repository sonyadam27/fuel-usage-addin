name: Validate Add-In Source

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets in add-in source
        run: |
          echo "Scanning add-in source files for accidental credentials..."
          # Only scan actual add-in source dirs — not scripts, configs, or this workflow file
          MATCHES=$(grep -rniE \
            "(password|sessionId|bearerToken|api_key)\s*[:=]\s*['\"][^'\"]{8,}" \
            addin_files/ js/ css/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: Potential hardcoded credential found in add-in source:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: No hardcoded credential patterns detected."

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          FAILED=0
          for f in $(git ls-files "*.json"); do
            python3 -m json.tool "$f" > /dev/null 2>&1 || { echo "INVALID JSON: $f"; FAILED=1; }
          done
          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "OK: All JSON files are valid."

      - name: Check required add-in files exist and are non-empty
        run: |
          echo "Checking required add-in files..."
          REQUIRED=(
            "addin_files/fuelHarnessReport.html"
            "addin_files/fuelTheftReport.html"
            "js/main.js"
          )
          FAILED=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -s "$f" ]; then
              echo "MISSING or EMPTY: $f"
              FAILED=1
            else
              echo "OK: $f ($(wc -c < "$f") bytes)"
            fi
          done
          if [ $FAILED -eq 1 ]; then exit 1; fi

      - name: Confirm no data files were committed
        run: |
          echo "Checking for accidentally committed data files..."
          FOUND=$(git ls-files "*.csv" "*.xlsx" "_device_map.json" 2>/dev/null)
          if [ -n "$FOUND" ]; then
            echo "FAIL: Data files found in repo — these must not be committed:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No data files committed."
