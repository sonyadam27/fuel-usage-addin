<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Usage Per Day</title>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div id="fuel-addin-container" style="font-family:Calibri,Arial,sans-serif;max-width:1400px;margin:0 auto;color:#222;box-sizing:border-box;border:2px solid #1F4E79;border-radius:10px;box-shadow:0 4px 20px rgba(31,78,121,.3);background:#fff;padding:0;overflow:hidden">

  <div style="background:linear-gradient(135deg,#1F4E79 0%,#2E75B6 100%);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:3px solid #163960">
    <div>
      <h1 style="margin:0;font-size:30px;font-weight:800;color:#fff;letter-spacing:.5px;text-shadow:0 2px 6px rgba(0,0,0,.3)">Fuel Usage Per Day</h1>
      <div style="font-size:14px;color:rgba(255,255,255,.9);margin-top:4px;font-weight:600">Database: <strong id="dbName">—</strong></div>
    </div>
  </div>

  <div style="background:linear-gradient(180deg,#EBF3FB 0%,#D6E8F5 100%);border-left:4px solid #1F4E79;border-bottom:1px solid #B8CCE4;padding:14px 20px;display:flex;align-items:flex-end;flex-wrap:wrap;gap:16px">
    <div style="display:flex;flex-direction:column;gap:4px">
      <label for="fromDate" style="font-size:12px;font-weight:700;color:#1F4E79;text-transform:uppercase;letter-spacing:.4px">From</label>
      <input type="date" id="fromDate" style="padding:7px 10px;border:1px solid #bcd0e0;border-radius:4px;font-size:14px;color:#222;background:#fff">
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <label for="toDate" style="font-size:12px;font-weight:700;color:#1F4E79;text-transform:uppercase;letter-spacing:.4px">To</label>
      <input type="date" id="toDate" style="padding:7px 10px;border:1px solid #bcd0e0;border-radius:4px;font-size:14px;color:#222;background:#fff">
    </div>
    <button id="btnLoad" style="padding:8px 22px;background:#1F4E79;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer">Load Data</button>
    <button id="btnExport" style="padding:8px 22px;background:#217346;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer">&#8659; Export CSV</button>
  </div>

  <div id="summaryCards" style="display:none;gap:14px;padding:16px 20px;background:#EBF3FB;border-bottom:1px solid #B8CCE4;flex-wrap:wrap">
    <div style="flex:1;min-width:150px;background:#fff;border:2px solid #1F4E79;border-radius:8px;padding:14px 18px;text-align:center;box-shadow:0 2px 8px rgba(31,78,121,.12)">
      <div style="font-size:11px;color:#1F4E79;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px;display:block">Total Vehicles</div>
      <div id="totalVehicles" style="font-size:28px;font-weight:800;color:#1F4E79;display:block;line-height:1.1">0</div>
    </div>
    <div style="flex:1;min-width:150px;background:#fff;border:2px solid #1F4E79;border-radius:8px;padding:14px 18px;text-align:center;box-shadow:0 2px 8px rgba(31,78,121,.12)">
      <div style="font-size:11px;color:#1F4E79;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px;display:block">Total Fuel Used (L)</div>
      <div id="totalFuel" style="font-size:28px;font-weight:800;color:#1F4E79;display:block;line-height:1.1">0</div>
    </div>
    <div style="flex:1;min-width:150px;background:#fff;border:2px solid #1F4E79;border-radius:8px;padding:14px 18px;text-align:center;box-shadow:0 2px 8px rgba(31,78,121,.12)">
      <div style="font-size:11px;color:#1F4E79;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px;display:block">Avg Fuel/Vehicle/Day (L)</div>
      <div id="avgFuel" style="font-size:28px;font-weight:800;color:#1F4E79;display:block;line-height:1.1">0</div>
    </div>
    <div style="flex:1;min-width:150px;background:#fff;border:2px solid #1F4E79;border-radius:8px;padding:14px 18px;text-align:center;box-shadow:0 2px 8px rgba(31,78,121,.12)">
      <div style="font-size:11px;color:#1F4E79;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px;display:block">Total Idle Fuel (L)</div>
      <div id="totalIdleFuel" style="font-size:28px;font-weight:800;color:#1F4E79;display:block;line-height:1.1">0</div>
    </div>
  </div>

  <div id="loading" style="display:none;text-align:center;padding:48px 20px;color:#666;background:#fff">
    <div style="width:44px;height:44px;border:4px solid #dce8f0;border-top-color:#1F4E79;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div>
    <p>Loading fuel data&hellip;</p>
  </div>

  <div id="errorMsg" style="display:none;background:#fde8e8;color:#a00;border:1px solid #f5b8b8;border-radius:4px;padding:12px 16px;margin:12px 20px;font-size:14px"></div>

  <div id="tableWrapper" style="display:none;border-top:2px solid #1F4E79;overflow-x:auto">
    <table id="fuelTable" style="width:100%;border-collapse:collapse;font-size:15px;min-width:600px">
      <thead>
        <tr>
          <th style="background:#1F4E79;color:#fff;padding:11px 12px;text-align:left;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid #2E75B6;border-left:2px solid #1F4E79;border-bottom:2px solid #163960;">Vehicle Name</th>
          <th style="background:#1F4E79;color:#fff;padding:11px 12px;text-align:center;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid #2E75B6;border-bottom:2px solid #163960;">Date</th>
          <th style="background:#1F4E79;color:#fff;padding:11px 12px;text-align:center;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid #2E75B6;border-bottom:2px solid #163960;">Total Fuel Used (L)</th>
          <th style="background:#1F4E79;color:#fff;padding:11px 12px;text-align:center;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid #2E75B6;border-bottom:2px solid #163960;">Idle Fuel Used (L)</th>
          <th style="background:#1F4E79;color:#fff;padding:11px 12px;text-align:center;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid #2E75B6;border-right:2px solid #1F4E79;border-bottom:2px solid #163960;">Driving Fuel Used (L)</th>
        </tr>
      </thead>
      <tbody id="fuelTableBody"></tbody>
    </table>
  </div>

  <div style="padding:8px 20px">
    <div id="fuelCount" style="font-size:13px;color:#666"></div>
  </div>
</div>

<script>
geotab.addin.fuelUsagePerDay=function(){"use strict";var api,state;var deviceCache={};function $(id){return document.getElementById(id)}function showLoading(show){$("loading").style.display=show?"block":"none"}function showError(msg){var el=$("errorMsg");if(msg){el.textContent=msg;el.style.display="block"}else{el.style.display="none"}}function setDefaultDates(){var today=new Date();var weekAgo=new Date();weekAgo.setDate(today.getDate()-7);$("toDate").value=formatDateInput(today);$("fromDate").value=formatDateInput(weekAgo)}function formatDateInput(d){var yyyy=d.getFullYear();var mm=String(d.getMonth()+1).padStart(2,"0");var dd=String(d.getDate()).padStart(2,"0");return yyyy+"-"+mm+"-"+dd}function formatDateDisplay(dateStr){var d=new Date(dateStr);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}function loadDevices(callback){api.call("Get",{typeName:"Device"},function(devices){deviceCache={};devices.forEach(function(d){deviceCache[d.id]=d.name||d.serialNumber||d.id});callback(devices)},function(err){showError("Failed to load vehicles: "+err.message);showLoading(false)})}function loadFuelData(){var fromDate=$("fromDate").value;var toDate=$("toDate").value;if(!fromDate||!toDate){showError("Please select both From and To dates.");return}if(new Date(fromDate)>new Date(toDate)){showError("From date must be before To date.");return}showError(null);showLoading(true);$("tableWrapper").style.display="none";$("summaryCards").style.display="none";loadDevices(function(){api.call("Get",{typeName:"FuelUsed",search:{fromDate:fromDate+"T00:00:00.000Z",toDate:toDate+"T23:59:59.999Z"}},function(fuelRecords){showLoading(false);processFuelData(fuelRecords)},function(err){showLoading(false);showError("Failed to load fuel data: "+err.message)})})}function processFuelData(records){if(!records||records.length===0){showError("No fuel data found for the selected date range.");return}var grouped={};records.forEach(function(r){var deviceId=r.device?r.device.id:"Unknown";var dateKey=formatDateDisplay(r.dateTime);var key=deviceId+"|"+dateKey;if(!grouped[key]){grouped[key]={deviceId:deviceId,vehicleName:deviceCache[deviceId]||deviceId,date:dateKey,totalFuel:0,idleFuel:0}}grouped[key].totalFuel+=(r.totalFuelUsed||0);grouped[key].idleFuel+=(r.totalIdlingFuelUsedL||0)});var rows=Object.values(grouped);rows.sort(function(a,b){if(a.date===b.date)return a.vehicleName.localeCompare(b.vehicleName);return a.date.localeCompare(b.date)});var uniqueVehicles=new Set(rows.map(function(r){return r.deviceId}));var totalFuelAll=rows.reduce(function(sum,r){return sum+r.totalFuel},0);var totalIdleAll=rows.reduce(function(sum,r){return sum+r.idleFuel},0);var uniqueDays=new Set(rows.map(function(r){return r.date}));var avgPerVehiclePerDay=uniqueVehicles.size>0&&uniqueDays.size>0?totalFuelAll/uniqueVehicles.size/uniqueDays.size:0;$("totalVehicles").textContent=uniqueVehicles.size;$("totalFuel").textContent=totalFuelAll.toFixed(2);$("avgFuel").textContent=avgPerVehiclePerDay.toFixed(2);$("totalIdleFuel").textContent=totalIdleAll.toFixed(2);$("summaryCards").style.display="flex";renderTable(rows)}function renderTable(rows){var B="padding:10px 12px;border-bottom:1px solid #c8d8e8;border-right:1px solid #dce8f0;font-size:15px;vertical-align:middle;white-space:nowrap;";var C=B+"text-align:center;";var tbody=$("fuelTableBody");tbody.innerHTML="";rows.forEach(function(row,i){var bg=i%2===0?"background:#fff;":"background:#deeaf1;";var drivingFuel=row.totalFuel-row.idleFuel;var tr=document.createElement("tr");tr.innerHTML='<td style="'+B+bg+'font-weight:600;border-left:2px solid #1F4E79;">'+escapeHtml(row.vehicleName)+'</td><td style="'+C+bg+'">'+row.date+'</td><td style="'+C+bg+'font-weight:700;">'+row.totalFuel.toFixed(2)+'</td><td style="'+C+bg+'">'+row.idleFuel.toFixed(2)+'</td><td style="'+C+bg+'border-right:2px solid #1F4E79;">'+drivingFuel.toFixed(2)+'</td>';tbody.appendChild(tr)});$("tableWrapper").style.display="block";$("fuelCount").textContent=rows.length+" row(s) | "+new Set(rows.map(function(r){return r.deviceId})).size+" vehicle(s)"}function escapeHtml(str){var div=document.createElement("div");div.textContent=str;return div.innerHTML}function exportCsv(){var table=$("fuelTable");if(!table)return;var rows=table.querySelectorAll("tr");var csvLines=[];rows.forEach(function(row){var cols=row.querySelectorAll("th, td");var line=[];cols.forEach(function(col){var text=col.textContent.replace(/"/g,'""');line.push('"'+text+'"')});csvLines.push(line.join(","))});var csvContent="\uFEFF"+csvLines.join("\r\n");var blob=new Blob([csvContent],{type:"text/csv;charset=utf-8;"});var url=URL.createObjectURL(blob);var link=document.createElement("a");link.href=url;var dbM=window.location.pathname.match(/\/([^\/]+)\//);var dn=dbM?dbM[1]:"export";link.download="fuel_usage_per_day_"+dn+".csv";link.click();URL.revokeObjectURL(url)}return{initialize:function(freshApi,freshState,callback){api=freshApi;state=freshState;var dbM=window.location.pathname.match(/\/([^\/]+)\//);var dn=dbM?dbM[1]:"Unknown";$("dbName").textContent=dn;setDefaultDates();$("btnLoad").addEventListener("click",loadFuelData);$("btnExport").addEventListener("click",exportCsv);callback()},focus:function(freshApi,freshState){api=freshApi;state=freshState;loadFuelData()},blur:function(){}}};
</script>
</body>
</html>
